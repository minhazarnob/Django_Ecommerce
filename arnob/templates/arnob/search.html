{% extends "arnob/base.html" %}
{% load static %}
{% block title %} Search Result {% endblock title %}

{% block main_content %}
    <div class="container my-5">
    <div class="row">
        <div class="col-sm-8">
            <div class="row">
                {% for prod in product %}
                    <div class="col-sm-4 text-center mb-4" style="font-family: Georgia, serif;">
                        <a href="{% url 'product-detail' prod.id %}" class="text-decoration-none">
                            <div class="border rounded shadow-sm p-2 h-100">
                                <img src="{{prod.product_image.url}}"
                                     class="img-fluid rounded mb-2 p-2"
                                     style="height:200px; object-fit:cover;">
                                
                                <div class="fw-bold text-dark fs-4">
                                    {{prod.title}}
                                </div>

                                <div class="fw-bold fs-5" style="color:#f82793">
                                    Rs.{{prod.discounted_price}}/-
                                    <small class="fw-light text-decoration-line-through fs-5">
                                        {{prod.selling_price}}
                                    </small>
                                </div>
                            </div>
                        </a>
                    </div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>

{% endblock main_content %}
